<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeão da Segurança</title>

<style>
body{
font-family:Arial;
background:#eef5fb;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

h1{
color:#0b2e59;
}

input,button{
padding:10px;
margin-top:10px;
width:100%;
border-radius:10px;
border:1px solid #ccc;
}

button{
background:#0b2e59;
color:white;
font-weight:bold;
cursor:pointer;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-top:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.hidden{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 Campeão da Segurança</h1>

<div class="card">
<label>Nome do colaborador</label>
<input id="nome">
<button onclick="salvarNome()">Iniciar</button>
</div>

<div id="jogo" class="card hidden">
<h3 id="pergunta"></h3>

<button onclick="responder(true)">Resposta correta</button>
<button onclick="responder(false)">Resposta errada</button>

<p id="resultado"></p>

<button onclick="finalizar()">Finalizar jogo</button>
</div>

<div id="final" class="card hidden">
<h2>Resultado</h2>
<p id="pontuacao"></p>
<button onclick="enviar()">Enviar ranking</button>
</div>

<div class="card">
<h3>Área Admin</h3>
<input id="senha" placeholder="Senha">
<button onclick="admin()">Entrar</button>

<div id="ranking"></div>
</div>

</div>

<script>

let nome="";
let pontos=0;
https://script.google.com/macros/s/AKfycbyvYm2PsTUeGDXbWx1wm0RgVhrHE2l4BKCEzAmea1NEaUEeiejXf106Hi3hL7SMXqdB0A/exec

function salvarNome(){
nome=document.getElementById("nome").value;
document.getElementById("jogo").classList.remove("hidden");
pergunta();
}

function pergunta(){
document.getElementById("pergunta").innerText="Situação de risco detectada. Qual a decisão correta?";
}

function responder(certo){
if(certo){
pontos+=10;
document.getElementById("resultado").innerText="✔ Acertou!";
}else{
document.getElementById("resultado").innerText="❌ Errou!";
}
}

function finalizar(){
document.getElementById("jogo").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");
document.getElementById("pontuacao").innerText="Pontuação: "+pontos;
}

async function enviar(){
await fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"saveScore",
nome:nome,
pontuacao:pontos,
acertos:pontos/10
})
});
alert("Enviado!");
}

async function admin(){
let senha=document.getElementById("senha").value;

let res=await fetch(API_URL+"?action=adminRanking&password="+senha);
let data=await res.json();

if(!data.ok){
alert("Senha errada");
return;
}

let html="<h4>Ranking</h4>";

data.ranking.forEach((r,i)=>{
html+=`${i+1} - ${r.nome} (${r.pontuacao})<br>`;
});

document.getElementById("ranking").innerHTML=html;
}

</script>

</body>
</html>
