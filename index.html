 <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campeão da Segurança</title>

<style>
body{
  font-family: Arial;
  background:#0f2a44;
  color:#fff;
  text-align:center;
  padding:20px;
}

.container{
  max-width:800px;
  margin:auto;
}

input{
  padding:10px;
  width:80%;
  border-radius:8px;
  border:none;
  margin-bottom:10px;
}

button{
  padding:12px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.btn{
  background:#1e90ff;
  color:white;
}

.card{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

img{
  width:200px;
  animation:flutuar 3s infinite ease-in-out;
}

@keyframes flutuar{
  0%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
  100%{transform:translateY(0)}
}

/* CERTIFICADO */
.certificado{
  display:none;
  background:#fff;
  color:#000;
  padding:40px;
  text-align:center;
}

.certificado h1{
  font-size:28px;
}

@media print {
  body *{
    visibility:hidden;
  }
  .certificado, .certificado *{
    visibility:visible;
  }
  .certificado{
    position:absolute;
    left:0;
    top:0;
    width:100%;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>🏆 Campeão da Segurança</h1>

<img src="mascotes-campeao.png">

<br><br>

<input id="nome" placeholder="Digite seu nome">
<br>
<button class="btn" onclick="iniciar()">Iniciar</button>

<div id="menu" style="display:none">
<h2>Escolha um módulo</h2>

<button class="btn" onclick="startGame('empilhadeira')">Empilhadeira</button>
<button class="btn" onclick="startGame('prensa')">Prensa</button>
<button class="btn" onclick="startGame('comportamento')">Comportamento Seguro</button>
</div>

<div id="game" class="card" style="display:none"></div>

<div id="ranking" class="card"></div>

</div>

<!-- CERTIFICADO -->
<div class="certificado" id="certificado">
<img src="logo-renaux.png" style="width:120px"><br><br>

<h1>CERTIFICADO DE CONCLUSÃO</h1>

<p>Certificamos que</p>
<h2 id="certNome"></h2>

<p>concluiu o treinamento gamificado de Segurança do Trabalho com excelência.</p>

<p><strong>Pontuação:</strong> <span id="certPontos"></span></p>
<p><strong>Data:</strong> <span id="certData"></span></p>

<br><br>

<img src="mascotes-campeao.png" style="width:180px"><br><br>

<p>__________________________________</p>
<p>SESMT - Segurança do Trabalho</p>

</div>

<script>

let nome = "";
let pontos = 0;
let perguntaAtual = 0;
let perguntas = [];

const banco = {

empilhadeira:[
{
q:"Empilhadeira próxima a pedestres. O que fazer?",
a:[
{text:"Reduzir velocidade e buzinar",c:true},
{text:"Continuar normal",c:false}
]
},
{
q:"Carga bloqueando visão",
a:[
{text:"Andar de ré",c:true},
{text:"Seguir normal",c:false}
]
}
],

prensa:[
{
q:"Máquina sem proteção",
a:[
{text:"Parar operação",c:true},
{text:"Continuar",c:false}
]
},
{
q:"Limpeza com máquina ligada",
a:[
{text:"Desligar antes",c:true},
{text:"Continuar rápido",c:false}
]
}
],

comportamento:[
{
q:"Uso de EPI é obrigatório?",
a:[
{text:"Sim",c:true},
{text:"Não",c:false}
]
},
{
q:"Correr na área operacional",
a:[
{text:"Risco alto",c:true},
{text:"Seguro",c:false}
]
}
]

};

function iniciar(){
nome = document.getElementById("nome").value;
if(nome===""){alert("Digite seu nome");return;}
document.getElementById("menu").style.display="block";
}

function startGame(tipo){
perguntas = banco[tipo];
pontos = 0;
perguntaAtual = 0;
document.getElementById("game").style.display="block";
mostrar();
}

function mostrar(){
let p = perguntas[perguntaAtual];

let html = `<h3>${p.q}</h3>`;

p.a.forEach((op,i)=>{
html+=`<button class="btn" onclick="responder(${i})">${op.text}</button><br>`;
});

document.getElementById("game").innerHTML = html;
}

function responder(i){
let correta = perguntas[perguntaAtual].a[i].c;

if(correta){
pontos+=10;
alert("✔ Acertou!");
}else{
alert("❌ Errou!");
}

perguntaAtual++;

if(perguntaAtual < perguntas.length){
mostrar();
}else{
finalizar();
}
}

function finalizar(){
salvarRanking();

document.getElementById("game").innerHTML = `
<h2>Fim do jogo</h2>
<p>Pontuação: ${pontos}</p>

<button class="btn" onclick="gerarCertificado()">📄 Gerar Certificado</button>
<button class="btn" onclick="location.reload()">Jogar novamente</button>
`;

mostrarRanking();
}

function gerarCertificado(){

document.getElementById("certNome").innerText = nome;
document.getElementById("certPontos").innerText = pontos;
document.getElementById("certData").innerText = new Date().toLocaleDateString();

document.getElementById("certificado").style.display="block";

window.print();

document.getElementById("certificado").style.display="none";
}

function salvarRanking(){
let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");
ranking.push({nome,pontos});
ranking.sort((a,b)=>b.pontos-a.pontos);
localStorage.setItem("ranking",JSON.stringify(ranking));
}

function mostrarRanking(){
let ranking = JSON.parse(localStorage.getItem("ranking")||"[]");

let html="<h3>Ranking</h3>";

ranking.slice(0,5).forEach((r,i)=>{
html+=`<p>${i+1}º - ${r.nome} (${r.pontos})</p>`;
});

document.getElementById("ranking").innerHTML = html;
}

mostrarRanking();

</script>

</body>
</html>
